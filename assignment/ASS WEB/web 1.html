<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Technology Lexicon</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: var(--primary);
            color: white;
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* The Grid Layout */
        .term-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .term-card {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            color: var(--primary);
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            border-bottom: 4px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .term-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            background-color: var(--accent);
            color: white;
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <header>
        <h1>Internet Terminology Explorer</h1>
        <p>BBIT Assignment 1: Topic 1 Knowledge Base</p>
    </header>

    <div class="container">
        <div class="term-grid">
            <!-- Every term becomes a Card -->
            <a href="pages/www.html" class="term-card">World Wide Web</a>
            <a href="pages/tcp-ip.html" class="term-card">TCP/IP</a>
            <a href="pages/browsers.html" class="term-card">Web Browsers</a>
            <a href="pages/servers.html" class="term-card">Web Servers</a>
            <a href="pages/url.html" class="term-card">URLs</a>
            <a href="pages/dns.html" class="term-card">DNS</a>
            <a href="pages/http.html" class="term-card">HTTP</a>
            <a href="pages/intranet.html" class="term-card">Intranet</a>
            <a href="pages/extranet.html" class="term-card">Extranet</a>
            <a href="pages/multitier.html" class="term-card">Multitier Architecture</a>
            <a href="pages/ftp.html" class="term-card">FTP</a>
            <a href="pages/html.html" class="term-card">HTML</a>
            <a href="pages/web1.html" class="term-card">Web 1.0</a>
            <a href="pages/web2.html" class="term-card">Web 2.0</a>
            <a href="pages/web3.html" class="term-card">Web 3.0</a>
            <a href="pages/web4.html" class="term-card">Web 4.0</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 BBIT Student - Git Project</p>
    </footer>

</body>
</html>
